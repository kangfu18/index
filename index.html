<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>YALA PLAYSTATION - จอแสดงผลลูกค้า 📺</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

  <style>
    body { background-color: #0f172a; color: #f8fafc; font-family: 'Prompt', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
    .screen-container { width: 100%; max-width: 750px; padding: 20px; text-align: center; }
    .card-display { background: rgba(30, 41, 59, 0.7); border: 2px solid #334155; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); padding: 40px; backdrop-filter: blur(10px); }
    .brand-title { font-size: 2.8rem; font-weight: 800; color: #3b82f6; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 20px rgba(59,130,246,0.5); }
    .station-badge { background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%); padding: 12px 30px; border-radius: 50px; font-size: 1.6rem; font-weight: 700; display: inline-block; box-shadow: 0 4px 15px rgba(244,63,94,0.4); }
    .price-text { font-size: 4rem; font-weight: 800; color: #10b981; text-shadow: 0 0 25px rgba(16,185,129,0.4); margin: 15px 0; }
    .qr-holder { background: #ffffff; padding: 20px; border-radius: 24px; display: inline-block; box-shadow: 0 0 30px rgba(255,255,255,0.1); border: 4px solid #38bdf8; }
    .qr-holder img { width: 220px; height: 220px; }
    .welcome-text { font-size: 3.5rem; font-weight: 800; color: #f59e0b; text-shadow: 0 0 20px rgba(245,158,11,0.4); }
    .sub-welcome { font-size: 1.5rem; color: #94a3b8; }
    .info-grid { background: rgba(15, 23, 42, 0.6); padding: 15px 25px; border-radius: 16px; border: 1px solid #475569; margin-bottom: 25px; }
  </style>
</head>
<body>

  <div class="screen-container">
    <div class="card-display">
      
      <div id="welcome-view" style="display: block; padding: 40px 0;">
        <div class="brand-title mb-2">🎮 YALA PLAYSTATION</div>
        <div class="welcome-text my-4">ยินดีต้อนรับครับ</div>
        <div class="sub-welcome">กรุณาแจ้งเปิดเครื่อง หรือสั่งอาหารกับแอดมินได้เลยครับ</div>
      </div>

      <div id="checkout-view" style="display: none;">
        <div class="brand-title mb-4">🎮 YALA PLAYSTATION</div>
        
        <div class="mb-4">
          <div id="cusStation" class="station-badge">🎮 โซน - เครื่อง</div>
        </div>

        <div class="info-grid text-start">
          <div class="row">
            <div class="col-12"><span class="text-muted small d-block">ชื่อลูกค้า</span><h4 id="cusName" class="fw-bold m-0 text-white">-</h4></div>
          </div>
        </div>

        <span class="text-white-50 fs-5 d-block">ยอดเงินสแกนชำระสุทธิ</span>
        <div id="cusAmount" class="price-text">0.00 บาท</div>

        <div class="my-3">
          <div class="qr-holder">
            <div id="customerQRTarget"></div>
          </div>
        </div>
        <span class="text-info small fw-bold d-block mt-2">📱 สแกน QR Code เพื่อชำระเงินเข้าบัญชีร้านโดยตรง</span>
      </div>

    </div>
  </div>

  <script>
    const PROMPTPAY_ID = '0980597696';
    const SUPABASE_URL = 'https://cqhtdhdbbprptotcxevo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxaHRkaGRiYnBycHRvdGN4ZXZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NjI3MDgsImV4cCI6MjA5NjIzODcwOH0.8rRvayE0qhqRxYHNHnG3_bI9KTqxWUBjbCMpKTdTnY4';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    window.onload = function() {
      initCustomerRealtime();
    };

    async function initCustomerRealtime() {
      // ดึงสถานะปัจจุบันรอบแรก (ถอดตัวแปร play_hours ที่สร้างปัญหาออกแล้ว)
      let { data } = await supabaseClient
        .from('customer_display')
        .select('id, show_checkout, zone, machine_number, customer_name, amount')
        .eq('id', 'current_checkout')
        .maybeSingle();
      
      if (!data) {
        const { data: newRow } = await supabaseClient
          .from('customer_display')
          .insert([{ id: 'current_checkout', show_checkout: false, amount: 0 }])
          .select()
          .single();
        data = newRow;
      }
      
      if(data) {
        renderCustomerView(data);
      }

      // ระบบตรวจจับ Real-time ยอดสแกนเงินสด/เงินโอน
      supabaseClient
        .channel('customer_global_stream')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'customer_display' }, payload => {
          if (payload.new && payload.new.id === 'current_checkout') {
            renderCustomerView(payload.new);
          }
        })
        .subscribe();
    }

    function renderCustomerView(data) {
      const welcomeView = document.getElementById('welcome-view');
      const checkoutView = document.getElementById('checkout-view');

      if (data && data.show_checkout && parseFloat(data.amount) > 0) {
        document.getElementById('cusStation').innerText = `🎮 ${data.zone || 'โซนความบันเทิง'} - เครื่อง ${data.machine_number || ''}`;
        document.getElementById('cusName').innerText = `คุณ: ${data.customer_name || 'ลูกค้าทั่วไป'}`;
        document.getElementById('cusAmount').innerText = `${parseFloat(data.amount).toFixed(2)} บาท`;

        // สร้างคิวอาร์โค้ดล็อกยอด
        let pCode = generatePromptPayPayload(PROMPTPAY_ID, parseFloat(data.amount));
        let qr = qrcode(0, 'M');
        qr.addData(pCode);
        qr.make();
        document.getElementById('customerQRTarget').innerHTML = qr.createImgTag(6);

        welcomeView.style.display = 'none';
        checkoutView.style.display = 'block';
      } else {
        welcomeView.style.display = 'block';
        checkoutView.style.display = 'none';
      }
    }

    function generatePromptPayPayload(targetId, amount) {
      let target = targetId.replace(/[- ]/g, '');
      let type = target.length >= 13 ? '03' : '01'; 
      let paddedTarget = target.length >= 13 ? target : ('0000000000000' + target).slice(-13);
      
      let payload = [
        '000201', '010211',
        '2937' + ('0016A000000677010111' + type + '13' + paddedTarget),
        '5802TH', '5303764'
      ];
      if (amount && amount > 0) {
        let amtStr = amount.toFixed(2);
        payload.push('54' + ('00' + amtStr.length).slice(-2) + amtStr);
      }
      payload.push('6304');
      
      let finalString = payload.join('');
      return finalString + crc16(finalString);
    }

    function crc16(str) {
      let crc = 0xFFFF;
      for (let c = 0; c < str.length; c++) {
        let code = str.charCodeAt(c);
        crc ^= (code << 8);
        for (let i = 0; i < 8; i++) {
          if (crc & 0x8000) crc = (crc << 1) ^ 0x1021;
          else crc = crc << 1;
        }
      }
      return ('0000' + (crc & 0xFFFF).toString(16).toUpperCase()).slice(-4);
    }
  </script>
</body>
</html>
